bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf ✅"

# Set new prefix to Ctrl-a
# Unbind the default prefix (Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Popup keymap — C-Space (no prefix) activates the popup table
set -s extended-keys always
bind-key -T root C-Space switch-client -T popup
bind-key -T popup p popup -d "#{pane_current_path}" -E "$SHELL"
bind-key -T popup g popup -d "#{pane_current_path}" -E -w 90% -h 90% "lazygit"
bind-key -T popup a popup -d "#{pane_current_path}" -E -w 90% -h 90% "claude"
bind-key -T popup t popup -d "#{pane_current_path}" -E -w 80% -h 80%

# Copy-mode vi: A → yank selection to clipboard and open Claude popup
bind-key -T copy-mode-vi A send-keys -X copy-pipe-and-cancel "pbcopy" \; popup -d "#{pane_current_path}" -E -w 90% -h 90% "claude"

set -g default-terminal "tmux-256color"
set -g set-titles on
set -g set-titles-string "#W: #{pane_current_command}@#{b:pane_current_path}"
set -g mode-keys vi
set -g base-index 1
set -g pane-base-index 1
set -g status-interval 5

# macOS clipboard integration
# Prefix-] loads from pbpaste so it pastes from the Mac clipboard, not just tmux's buffer
bind ] run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Auto-install TPM if not already installed, pinned to a known-good commit
if-shell '[ ! -d ~/.tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && git -C ~/.tmux/plugins/tpm checkout e261deb1b47614eed3400089ce7197dc68acc4eb"'

set -g @plugin 'tmux-plugins/tpm'

# Plugins
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'

# set -g @plugin 'janoamaral/tokyo-night-tmux'
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'light'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @continuum-restore 'on'

run '~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux'

set -g status-left-length 100
set -g status-right-length 150
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_gitmux}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#(~/.claude/scripts/tmux_status_claude.sh)"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'


# Initialize TPM (must be at the bottom)
run-shell '~/.tmux/plugins/tpm/tpm'

